# List of stages for jobs, and their order of execution
stages:
  - build
  - publish

# Default image for all jobs
default:
  tags:
    - buildah
  cache:
    key: buildah-cache
    paths:
      - /var/lib/containers

# Job building container image
build-container-job:
  stage: build
  script:
    - echo "Building container image with Buildah..."
    - buildah login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - buildah pull $CI_REGISTRY_IMAGE:latest || true

    # Build using full SHA
    - buildah bud --build-arg BUILDKIT_INLINE_CACHE=1 --layers -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .

    # Tag with short SHA
    - buildah tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

    # Push both tags
    - buildah push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - buildah push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - echo "Container image built."
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Job properly tagging the container in the registry
publish-container-job:
  stage: publish
  needs:
    - build-container-job
  script:
    - echo "Publishing container image..."
    - buildah login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - buildah pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA

    # Determine branch/PR tag
    - |
      if [ -n "$CI_MERGE_REQUEST_IID" ]; then
        IMAGE_TAG="pr-$CI_MERGE_REQUEST_IID"
        echo "Merge request detected → tag: $IMAGE_TAG"
      else
        IMAGE_TAG=$(echo "$CI_COMMIT_BRANCH" | tr '/' '-')
        echo "Branch detected → tag: $IMAGE_TAG"
      fi

    # Tag and push branch/PR tag
    - buildah tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:$IMAGE_TAG
    - buildah push $CI_REGISTRY_IMAGE:$IMAGE_TAG

    # Tag and push latest if on main/master
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ] || [ "$CI_COMMIT_BRANCH" = "master" ]; then
        buildah tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
        buildah push $CI_REGISTRY_IMAGE:latest
      fi

    - echo "Container image published."
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"